bundle:
  name: ccda-chatbot

variables:
  files_id:
    description: Unity Catalog volume full name for C-CDA docs
  serving_endpoint_name:
    description: Serving endpoint name

resources:
  apps:
    app:
      name: "ccda-chatbot"
      description: "C-CDA patient health summary chatbot (no Agent Bricks)"
      source_code_path: ./
      user_api_scopes:
        - files.files
        - serving.serving-endpoints

      resources:
        - name: files
          uc_securable:
            securable_full_name: ${var.files_id}
            securable_type: VOLUME
            permission: WRITE_VOLUME
        - name: serving-endpoint
          serving_endpoint:
            name: ${var.serving_endpoint_name}
            permission: CAN_QUERY

targets:
  default:
    default: true
    workspace:
      host: https://dbc-7c3eed4c-66bb.cloud.databricks.com
      profile: dbc-7c3eed4c

    variables:
      files_id: workspace.default.ccda_chatbot_docs
      serving_endpoint_name: databricks-meta-llama-3-3-70b-instruct
